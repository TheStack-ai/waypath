<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Waypath — local-first external brain for coding agents">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="55%" stop-color="#a371f7"/>
      <stop offset="100%" stop-color="#bc8cff"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#bc8cff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#bc8cff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="180" cy="315" r="360" fill="url(#glow1)"/>
  <circle cx="1020" cy="315" r="360" fill="url(#glow2)"/>

  <!-- left graph -->
  <g stroke="#58a6ff" stroke-width="1.5" stroke-opacity="0.55" fill="none">
    <line x1="100" y1="140" x2="200" y2="230"/>
    <line x1="200" y1="230" x2="140" y2="360"/>
    <line x1="140" y1="360" x2="250" y2="430"/>
    <line x1="250" y1="430" x2="310" y2="320"/>
    <line x1="310" y1="320" x2="200" y2="230"/>
    <line x1="200" y1="230" x2="290" y2="160"/>
    <line x1="310" y1="320" x2="380" y2="400"/>
  </g>
  <g fill="#58a6ff">
    <circle cx="100" cy="140" r="5"/>
    <circle cx="200" cy="230" r="7"/>
    <circle cx="140" cy="360" r="5"/>
    <circle cx="250" cy="430" r="5"/>
    <circle cx="310" cy="320" r="6"/>
    <circle cx="290" cy="160" r="5"/>
    <circle cx="380" cy="400" r="4"/>
  </g>

  <!-- right graph -->
  <g stroke="#bc8cff" stroke-width="1.5" stroke-opacity="0.55" fill="none">
    <line x1="900" y1="160" x2="980" y2="280"/>
    <line x1="980" y1="280" x2="1080" y2="180"/>
    <line x1="1080" y1="180" x2="1150" y2="330"/>
    <line x1="1150" y1="330" x2="1050" y2="420"/>
    <line x1="1050" y1="420" x2="980" y2="280"/>
    <line x1="980" y1="280" x2="940" y2="400"/>
  </g>
  <g fill="#bc8cff">
    <circle cx="900" cy="160" r="5"/>
    <circle cx="980" cy="280" r="7"/>
    <circle cx="1080" cy="180" r="5"/>
    <circle cx="1150" cy="330" r="5"/>
    <circle cx="1050" cy="420" r="5"/>
    <circle cx="940" cy="400" r="4"/>
  </g>

  <!-- Title -->
  <text x="600" y="320" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace" font-size="150" font-weight="700" fill="url(#accent)" text-anchor="middle" letter-spacing="-4">waypath</text>

  <!-- Tagline -->
  <text x="600" y="385" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="30" font-weight="400" fill="#c9d1d9" text-anchor="middle">local-first external brain for coding agents</text>

  <!-- Meta -->
  <text x="600" y="470" font-family="ui-monospace, SFMono-Regular, monospace" font-size="18" fill="#6e7681" text-anchor="middle" letter-spacing="3">SQLite  ·  graph-aware recall  ·  governed memory  ·  MCP-native</text>

  <!-- Install hint -->
  <g transform="translate(600, 540)">
    <rect x="-195" y="-24" width="390" height="42" rx="8" ry="8" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="0" y="3" font-family="ui-monospace, SFMono-Regular, monospace" font-size="18" fill="#58a6ff" text-anchor="middle" dominant-baseline="middle">$ npm install -g waypath</text>
  </g>
</svg>
