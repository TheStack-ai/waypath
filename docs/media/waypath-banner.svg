<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" width="1280" height="400" role="img" aria-label="Waypath — local-first external brain for coding agents">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="55%" stop-color="#a371f7"/>
      <stop offset="100%" stop-color="#bc8cff"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#bc8cff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#bc8cff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="400" fill="url(#bg)"/>
  <circle cx="220" cy="200" r="300" fill="url(#glow1)"/>
  <circle cx="1060" cy="200" r="300" fill="url(#glow2)"/>

  <!-- left graph -->
  <g stroke="#58a6ff" stroke-width="1" stroke-opacity="0.55" fill="none">
    <line x1="110" y1="90" x2="210" y2="160"/>
    <line x1="210" y1="160" x2="150" y2="260"/>
    <line x1="150" y1="260" x2="250" y2="310"/>
    <line x1="250" y1="310" x2="310" y2="220"/>
    <line x1="310" y1="220" x2="210" y2="160"/>
    <line x1="210" y1="160" x2="290" y2="100"/>
    <line x1="310" y1="220" x2="380" y2="280"/>
  </g>
  <g fill="#58a6ff">
    <circle cx="110" cy="90" r="4"/>
    <circle cx="210" cy="160" r="6"/>
    <circle cx="150" cy="260" r="4"/>
    <circle cx="250" cy="310" r="4"/>
    <circle cx="310" cy="220" r="5"/>
    <circle cx="290" cy="100" r="4"/>
    <circle cx="380" cy="280" r="3"/>
  </g>

  <!-- right graph -->
  <g stroke="#bc8cff" stroke-width="1" stroke-opacity="0.55" fill="none">
    <line x1="960" y1="110" x2="1030" y2="200"/>
    <line x1="1030" y1="200" x2="1110" y2="130"/>
    <line x1="1110" y1="130" x2="1180" y2="230"/>
    <line x1="1180" y1="230" x2="1090" y2="300"/>
    <line x1="1090" y1="300" x2="1030" y2="200"/>
    <line x1="1030" y1="200" x2="1000" y2="280"/>
    <line x1="1030" y1="200" x2="910" y2="180"/>
  </g>
  <g fill="#bc8cff">
    <circle cx="960" cy="110" r="4"/>
    <circle cx="1030" cy="200" r="6"/>
    <circle cx="1110" cy="130" r="4"/>
    <circle cx="1180" cy="230" r="4"/>
    <circle cx="1090" cy="300" r="4"/>
    <circle cx="1000" cy="280" r="3"/>
    <circle cx="910" cy="180" r="3"/>
  </g>

  <!-- Title -->
  <text x="640" y="210" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace" font-size="128" font-weight="700" fill="url(#accent)" text-anchor="middle" letter-spacing="-4">waypath</text>

  <!-- Tagline -->
  <text x="640" y="262" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="400" fill="#c9d1d9" text-anchor="middle">local-first external brain for coding agents</text>

  <!-- Meta -->
  <text x="640" y="320" font-family="ui-monospace, SFMono-Regular, monospace" font-size="13" fill="#6e7681" text-anchor="middle" letter-spacing="3">SQLite  ·  graph-aware recall  ·  governed memory  ·  MCP-native</text>

  <!-- Install hint -->
  <g transform="translate(640, 356)">
    <rect x="-150" y="-18" width="300" height="30" rx="6" ry="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="0" y="2" font-family="ui-monospace, SFMono-Regular, monospace" font-size="13" fill="#58a6ff" text-anchor="middle" dominant-baseline="middle">$ npm install -g waypath</text>
  </g>
</svg>
